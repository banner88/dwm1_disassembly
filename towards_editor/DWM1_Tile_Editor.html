<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DWM1 Multi-Tileset Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#ddd;font-family:'SF Mono','Menlo','Consolas',monospace;font-size:12px}
.wrap{max-width:1400px;margin:0 auto;padding:8px 12px}
.hdr{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.title{font-size:15px;font-weight:700;color:#f59e0b;letter-spacing:.02em}
.sub{font-size:10px;color:#555}
.toolbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;align-items:center}
.tbtn{padding:4px 10px;font-size:12px;font-weight:700;border-radius:4px;border:none;cursor:pointer;background:#333;color:#bbb;transition:all .15s;font-family:inherit}
.tbtn.active{background:#f59e0b;color:#111}
.tbtn:hover{background:#444}
.sbtn{padding:3px 8px;font-size:11px;border-radius:4px;border:none;cursor:pointer;background:#333;color:#bbb;font-family:inherit}
.sbtn:hover{background:#444}
.sep{width:1px;height:18px;background:#222;margin:0 2px}
.main{display:flex;gap:10px;flex-wrap:nowrap}
.side{width:290px;flex-shrink:0}
.canv-wrap{flex:1;min-width:0;overflow-x:auto}
.lbl{font-size:10px;color:#555;margin-bottom:3px}
.lbl span{color:#f59e0b;font-weight:700}
canvas{image-rendering:pixelated;display:block}
.panel{background:#111;border:1px solid #222;border-radius:6px;padding:8px;margin-bottom:8px}
.panel-hdr{font-size:11px;font-weight:700;color:#f59e0b;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.panel-sub{font-size:9px;color:#444}
select{background:#1a1a1a;color:#ccc;border:1px solid #333;border-radius:4px;padding:3px 6px;font-size:11px;font-family:inherit;max-width:100%}
.status{font-size:10px;color:#444;margin-top:6px;padding:4px 0;border-top:1px solid #181818}
.ebox{background:#141414;border:1px solid #282828;border-radius:6px;padding:8px;margin-bottom:6px}
.ebox textarea{width:100%;height:120px;background:#0a0a0a;color:#aaa;border:1px solid #282828;border-radius:4px;padding:6px;font-family:monospace;font-size:10px;resize:vertical}
.grn{background:#1a3a1a!important;color:#6ee06e!important}
.stamp-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.stamp-item{background:#1a1a1a;border:1px solid #282828;border-radius:4px;padding:3px;cursor:pointer;position:relative}
.stamp-item:hover{border-color:#f59e0b}
.stamp-item.active{border-color:#f59e0b;background:#1a1500}
.stamp-del{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:#c00;color:#fff;font-size:9px;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.stamp-item:hover .stamp-del{display:flex}
.markers{margin-top:6px}
.mrow{display:flex;align-items:center;gap:4px;margin-bottom:2px;font-size:10px}
.mdot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.minp{width:32px;background:#141414;color:#aaa;border:1px solid #282828;border-radius:3px;padding:1px 3px;font-size:10px;text-align:center;font-family:inherit}
.mkey{color:#444}
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700}
.cv-scroll{overflow-x:auto;border:1px solid #282828;border-radius:4px;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <span class="title">DWM1 Multi-Tileset Editor</span>
  <span class="sub">Combine tiles from any tileset · 2×2 stamps · Full export</span>
</div>
<div class="toolbar">
  <select id="roomSelect" onchange="loadRoom(this.value)" style="max-width:220px">
    <option value="">— Load existing room —</option>
  </select>
  <div class="sep"></div>
  <button class="tbtn active" id="bt_paint" onclick="setTool('paint')">Paint</button>
  <button class="tbtn" id="bt_stamp" onclick="setTool('stamp')">Stamp</button>
  <button class="tbtn" id="bt_erase" onclick="setTool('erase')">Erase</button>
  <button class="tbtn" id="bt_pick" onclick="setTool('pick')">Pick</button>
  <button class="tbtn" id="bt_fill" onclick="setTool('fill')">Fill</button>
  <div class="sep"></div>
  <button class="tbtn" id="gridBtn" onclick="toggleGrid()">Grid ✓</button>
  <button class="tbtn" id="markBtn" onclick="toggleMarkers()">Markers ✓</button>
  <button class="tbtn" id="walkBtn" onclick="toggleWalk()">Walk ✗</button>
    <button class="tbtn" id="walkEditBtn" onclick="toggleWalkEdit()" title="Click canvas tiles to toggle walk/wall">WalkEdit ✗</button>
    <button class="tbtn" onclick="resetAll()" style="color:#f87171">⟲ Reset All</button>
  <button class="sbtn" onclick="adjZoom(-1)">−</button>
  <span id="zoomLbl" style="font-size:10px;color:#666;width:24px;text-align:center">3×</span>
  <button class="sbtn" onclick="adjZoom(1)">+</button>
  <div class="sep"></div>
  <button class="sbtn" onclick="doUndo()">Undo</button>
  <button class="sbtn" onclick="doRedo()">Redo</button>
  <button class="sbtn" onclick="clearAll()">Clear</button>
  <div class="sep"></div>
  <button class="tbtn grn" onclick="showExport()">Export</button>
  <button class="sbtn" onclick="showImportBox()">Import</button>
</div>

<div class="main">
<div class="side">
  <!-- Source tileset browser -->
  <div class="panel">
    <div class="panel-hdr">Source Tilesets <span class="panel-sub">click tile → add to palette</span></div>
    <select id="srcTS" onchange="loadSrcTileset(this.value)" style="width:100%;margin-bottom:4px"></select>
    <div id="srcScroll" style="max-height:300px;overflow-y:auto;border:1px solid #333"><canvas id="srcCanvas" width="384" height="192" style="display:block" style="border:1px solid #282828;border-radius:4px;cursor:pointer;width:100%"></canvas></div>
  </div>

  <!-- Combined palette -->
  <div class="panel">
    <div class="panel-hdr">Custom Palette <span id="palCount" class="panel-sub">0/128</span></div>
    <canvas id="palCanvas" width="384" height="192" style="border:1px solid #282828;border-radius:4px;cursor:pointer;width:100%"></canvas>
    <div class="panel-sub" style="margin-top:2px">Selected: <span id="selLbl">—</span> · Right-click to remove</div>
  </div>

  <!-- Tile Properties -->
  <div class="panel">
    <div class="panel-hdr">Tile Properties</div>
    <div id="tileProps" style="min-height:24px;padding:2px 0"><em>No tile selected</em></div>
  </div>

  <!-- 2×2 Stamps -->
  <div class="panel">
    <div class="panel-hdr">2×2 Stamps <button class="sbtn" onclick="newStamp()" style="font-size:9px;padding:2px 6px">+ New</button></div>
    <div id="stampGrid" class="stamp-grid"></div>
  </div>

  <!-- Markers -->
  <div class="panel">
    <div class="panel-hdr">Markers <button class="sbtn" onclick="addMarker()" style="font-size:9px;padding:2px 6px">+ Add</button></div>
    <div id="markerList" class="markers"></div>
  </div>
</div>

<div class="canv-wrap">
  <div class="lbl"><span id="hoverLbl"></span></div>
  <div class="cv-scroll">
    <canvas id="mainCanvas"></canvas>
  </div>
  <div id="exportBox" class="ebox" style="display:none;margin-top:6px">
    <div style="display:flex;gap:4px;margin-bottom:4px">
      <button class="sbtn grn" onclick="copyExport()">Copy</button>
      <button class="sbtn" onclick="document.getElementById('exportBox').style.display='none'">Close</button>
    </div>
    <textarea id="exportArea"></textarea>
  </div>
  <div id="importBox" class="ebox" style="display:none;margin-top:6px">
    <div style="display:flex;gap:4px;margin-bottom:4px">
      <button class="sbtn grn" onclick="doImport()">Import</button>
      <button class="sbtn" onclick="document.getElementById('importBox').style.display='none'">Close</button>
    </div>
    <textarea id="importArea" placeholder="Paste exported JSON here"></textarea>
  </div>
  <div class="status" id="status">Ready</div>
</div>
</div>
</div>

// ===== Walkability: tile index < threshold = walkable =====
function isWalkable(tsKey, tileIdx){
  const thresh = TILE_THRESH[tsKey];
  if(thresh===undefined) return tileIdx >= 64;
  return tileIdx >= thresh;
}
// Per-tile override: palette[i].walk (true/false/undefined)
function getTileWalk(i){
  if(i<0||i>=palette.length) return true;
  const p=palette[i];
  if(p.walk!==undefined) return p.walk;
  return isWalkable(p.ts,p.idx);
}
function toggleTileWalk(){
  if(sel<0||sel>=palette.length) return;
  const cur=getTileWalk(sel);
  palette[sel].walk=!cur;
  drawCombinedPalette();drawCanvas();saveState();updateTileProps();
}
function resetTileWalk(){
  if(sel<0||sel>=palette.length) return;
  delete palette[sel].walk;
  drawCombinedPalette();drawCanvas();saveState();updateTileProps();
}
function updateTileProps(){
  const panel=document.getElementById("tileProps");
  if(sel<0||sel>=palette.length){panel.innerHTML="<em>No tile selected</em>";return}
  const p=palette[sel];
  const w=getTileWalk(sel);
  const def=isWalkable(p.ts,p.idx);
  const overridden=p.walk!==undefined;
  panel.innerHTML=`<div style="display:flex;gap:8px;align-items:center">

}

  img.src="data:image/png;base64,"+TS[key];

function drawSrcPalette(){
  const c=document.getElementById("srcCanvas").getContext("2d");
  c.imageSmoothingEnabled=false;
  if(!srcImg)return;
  // Dynamic height based on tileset image
  const totalTiles=Math.ceil(srcImg.naturalHeight/8)*16;
  const tileRows=Math.ceil(srcImg.naturalHeight/8);
  const cvH=tileRows*8*PS;
  c.canvas.height=cvH;
  c.clearRect(0,0,384,cvH);
  c.imageSmoothingEnabled=false;
  const thresh=TILE_THRESH[curSrcTS]||64;
  for(let i=0;i<tileRows*16;i++){
    const sx=(i%16)*8,sy=Math.floor(i/16)*8;
    if(sy>=srcImg.naturalHeight)break;
    const dx=(i%16)*8*PS,dy=Math.floor(i/16)*8*PS;
    c.drawImage(srcImg,sx,sy,8,8,dx,dy,8*PS,8*PS);
    // Walkability tint on source
    if(showWalk){
      c.fillStyle=i>=thresh?"rgba(0,150,255,0.40)":"rgba(255,140,0,0.45)";
      c.fillRect(dx,dy,8*PS,8*PS);
    }
  }
  // (selection drawn at end of function)
  // Threshold line
  if(showWalk&&thresh>0&&thresh<128){
    const row=Math.floor(thresh/16),col=thresh%16;
    c.strokeStyle="#ff4444";c.lineWidth=2;c.setLineDash([4,2]);
    const y=row*8*PS;
    c.beginPath();c.moveTo(col*8*PS,y);c.lineTo(16*8*PS,y);c.stroke();
    if(col>0){c.beginPath();c.moveTo(0,y+8*PS);c.lineTo(col*8*PS,y+8*PS);c.stroke()}
    c.setLineDash([]);
    c.fillStyle="#ff4444";c.font="9px monospace";
    c.fillText("threshold="+thresh,2,y-2);
  }
  // Selection square — drawn LAST so nothing overdraws it
  if(srcSel>=0){
    const sx2=(srcSel%16)*8*PS,sy2=Math.floor(srcSel/16)*8*PS;
    c.strokeStyle="#fff";c.lineWidth=3;c.strokeRect(sx2,sy2,8*PS,8*PS);
    c.strokeStyle="#f59e0b";c.lineWidth=2;c.strokeRect(sx2+1,sy2+1,8*PS-2,8*PS-2);
  }
}

  const col=Math.floor((e.clientX-rect.left)*scaleX/(8*PS));
  const row=Math.floor((e.clientY-rect.top)*scaleY/(8*PS));
  if(col<0||col>=16||row<0)return;
  const idx=row*16+col;
  if(stampBuilder){
    let slotIdx=palette.findIndex(p=>p.ts===curSrcTS&&p.idx===idx);
    if(slotIdx<0){
      if(palette.length>=128){setStatus("Palette full");return}
      palette.push({ts:curSrcTS,idx});slotIdx=palette.length-1;
    }
    stampBuilder.tiles.push(slotIdx);
    finishStampStep();
    drawSrcPalette();drawCombinedPalette();return;
  }
  srcSel=idx;drawSrcPalette();
  const existing=palette.findIndex(p=>p.ts===curSrcTS&&p.idx===idx);
  if(existing>=0){sel=existing;pendingSrc=null;setTool("paint");drawCombinedPalette();setStatus("Selected slot "+existing);return}
  // Don't add yet — just mark as pending. Added to palette when painted.
  pendingSrc={ts:curSrcTS,idx};sel=-1;setTool("paint");
  drawCombinedPalette();
  setStatus("Tile "+hex(idx)+" ready — paint on canvas to add");
});

// ===== Combined palette =====
function drawCombinedPalette(){
  const cv=document.getElementById("palCanvas");
  const c=cv.getContext("2d");
  c.imageSmoothingEnabled=false;c.clearRect(0,0,384,192);
  c.strokeStyle="#1a1a1a";c.lineWidth=0.5;
  for(let i=0;i<128;i++)c.strokeRect((i%16)*8*PS,Math.floor(i/16)*8*PS,8*PS,8*PS);
  if(!palette.length){
    c.fillStyle="#333";c.font="11px monospace";c.textAlign="center";
    c.fillText("Click tiles above to build palette",192,96);
    document.getElementById("palCount").textContent="0/128";
    document.getElementById("selLbl").textContent="—";return;
  }
  let pending=0;
  palette.forEach((p,i)=>{
    const img=tsImages[p.ts];
    if(img){
      const sx=(p.idx%16)*8,sy=Math.floor(p.idx/16)*8;
      const dx=(i%16)*8*PS,dy=Math.floor(i/16)*8*PS;
      c.drawImage(img,sx,sy,8,8,dx,dy,8*PS,8*PS);
      if(showWalk){
        const w=getTileWalk(i);
        c.fillStyle=w?"rgba(0,150,255,0.40)":"rgba(255,140,0,0.45)";
        c.fillRect(dx,dy,8*PS,8*PS);
        c.fillStyle=w?"#3b82f6":"#f97316";c.font="bold 8px monospace";c.textAlign="center";
        c.fillText(w?"W":"X",dx+8*PS/2,dy+8*PS/2+3);
        if(palette[i].walk!==undefined){c.strokeStyle="#f59e0b";c.lineWidth=1;c.strokeRect(dx+1,dy+1,8*PS-2,8*PS-2)}
      }
    } else {pending++;getTSImage(p.ts,()=>{pending--;if(pending<=0)drawCombinedPalette()})}
  });
  if(sel>=0&&sel<palette.length){
    const px=(sel%16)*8*PS,py=Math.floor(sel/16)*8*PS,sz=8*PS;
    c.strokeStyle="#fff";c.lineWidth=2;
    const m=5;// corner mark length
    c.beginPath();
    c.moveTo(px,py+m);c.lineTo(px,py);c.lineTo(px+m,py);
    c.moveTo(px+sz-m,py);c.lineTo(px+sz,py);c.lineTo(px+sz,py+m);
    c.moveTo(px+sz,py+sz-m);c.lineTo(px+sz,py+sz);c.lineTo(px+sz-m,py+sz);
    c.moveTo(px+m,py+sz);c.lineTo(px,py+sz);c.lineTo(px,py+sz-m);
    c.stroke();
    c.strokeStyle="#000";c.lineWidth=1;
    c.beginPath();
    c.moveTo(px+1,py+m);c.lineTo(px+1,py+1);c.lineTo(px+m,py+1);
    c.moveTo(px+sz-m,py+1);c.lineTo(px+sz-1,py+1);c.lineTo(px+sz-1,py+m);
    c.moveTo(px+sz-1,py+sz-m);c.lineTo(px+sz-1,py+sz-1);c.lineTo(px+sz-m,py+sz-1);
    c.moveTo(px+m,py+sz-1);c.lineTo(px+1,py+sz-1);c.lineTo(px+1,py+sz-m);
    c.stroke();
  }
  document.getElementById("palCount").textContent=palette.length+"/128";
  document.getElementById("selLbl").textContent=sel>=0&&sel<palette.length?
    "Slot "+sel+" ["+palette[sel].ts+" "+hex(palette[sel].idx)+(getTileWalk(sel)?" walkable":" WALL")+"]":"—";
  updateTileProps();
}

const palCanvas=document.getElementById("palCanvas");
palCanvas.addEventListener("click",e=>{
  const rect=palCanvas.getBoundingClientRect();
  const scaleX=384/rect.width,scaleY=192/rect.height;
  const col=Math.floor((e.clientX-rect.left)*scaleX/(8*PS));
  const row=Math.floor((e.clientY-rect.top)*scaleY/(8*PS));
  if(col<0||col>=16||row<0||row>=8)return;
  const i=row*16+col;
  if(i>=palette.length)return;
  if(stampBuilder){stampBuilder.tiles.push(i);finishStampStep();drawCombinedPalette();return}
  sel=i;setTool("paint");drawCombinedPalette();
  setStatus("Slot "+i+": "+palette[i].ts+" tile "+hex(palette[i].idx));
});
palCanvas.addEventListener("contextmenu",e=>{
  e.preventDefault();
  const rect=palCanvas.getBoundingClientRect();
  const scaleX=384/rect.width,scaleY=192/rect.height;
  const i=Math.floor((e.clientY-rect.top)*scaleY/(8*PS))*16+Math.floor((e.clientX-rect.left)*scaleX/(8*PS));
  if(i<0||i>=palette.length)return;
  palette.splice(i,1);
  for(let r=0;r<GR;r++)for(let cc=0;cc<G;cc++){if(layout[r][cc]===i)layout[r][cc]=-1;else if(layout[r][cc]>i)layout[r][cc]--}
  stamps.forEach(st=>st.tiles=st.tiles.map(t=>t===i?-1:t>i?t-1:t));
  if(sel>=palette.length)sel=palette.length-1;
  drawCombinedPalette();drawCanvas();drawSrcPalette();renderStamps();saveState();
});

// ===== Main canvas =====
function drawCanvas(){
  const cv=document.getElementById("mainCanvas");
  const cell=TPX*zoom;
  cv.width=G*cell;cv.height=GR*cell;
  const c=cv.getContext("2d");
  c.imageSmoothingEnabled=false;
  c.fillStyle="#0d0d0d";c.fillRect(0,0,cv.width,cv.height);
  for(let r=0;r<GR;r++)for(let col=0;col<G;col++){
    const ti=layout[r][col];
    if(ti>=0&&ti<palette.length){
      const p=palette[ti],img=tsImages[p.ts];
      if(img){
        c.drawImage(img,(p.idx%16)*8,Math.floor(p.idx/16)*8,8,8,col*cell,r*cell,cell,cell);
      }
      if(showWalk){
        const w=getTileWalk(ti);
        c.fillStyle=w?"rgba(0,150,255,0.40)":"rgba(255,140,0,0.45)";
        c.fillRect(col*cell,r*cell,cell,cell);
        c.fillStyle=w?"rgba(255,255,255,0.95)":"rgba(0,0,0,0.85)";
        c.font="bold "+Math.max(10,cell/2.5)+"px monospace";c.textAlign="center";c.textBaseline="middle";
        c.fillText(w?"W":"X",col*cell+cell/2,r*cell+cell/2);
        if(!w){
          c.strokeStyle="rgba(255,140,0,0.6)";c.lineWidth=1;
          c.beginPath();c.moveTo(col*cell+2,r*cell+2);c.lineTo((col+1)*cell-2,(r+1)*cell-2);c.stroke();
          c.beginPath();c.moveTo((col+1)*cell-2,r*cell+2);c.lineTo(col*cell+2,(r+1)*cell-2);c.stroke();
        }
      }
    }
  }
  if(showGrid){
    c.strokeStyle="rgba(255,255,255,0.12)";c.lineWidth=1;
    for(let r=0;r<=GR;r++){c.beginPath();c.moveTo(0,r*cell);c.lineTo(G*cell,r*cell);c.stroke()}
    for(let col=0;col<=G;col++){c.beginPath();c.moveTo(col*cell,0);c.lineTo(col*cell,GR*cell);c.stroke()}
  }
  // Markers as 2×2 blocks
  if(showMark)markers.forEach(m=>{
    const mw=m.w||2,mh=m.h||2;
    c.fillStyle=m.color+"33";c.fillRect(m.x*cell,m.y*cell,mw*cell,mh*cell);
    c.strokeStyle=m.color;c.lineWidth=2;c.strokeRect(m.x*cell+1,m.y*cell+1,mw*cell-2,mh*cell-2);
    c.fillStyle="#fff";c.font=`bold ${Math.max(10,cell*.6)}px monospace`;
    c.textAlign="center";c.textBaseline="middle";
    c.fillText(m.glyph,m.x*cell+mw*cell/2,m.y*cell+mh*cell/2);
  });
  if(hover){
    c.strokeStyle="#f59e0baa";c.lineWidth=2;
    if(tool==="stamp"&&activeStamp>=0){
      const st=stamps[activeStamp];
      c.strokeRect(hover.c*cell+1,hover.r*cell+1,st.w*cell-2,st.h*cell-2);
    } else c.strokeRect(hover.c*cell+1,hover.r*cell+1,cell-2,cell-2);
  }
}

function getCell(e){
  const cv=document.getElementById("mainCanvas"),rect=cv.getBoundingClientRect();
  const scaleX=cv.width/rect.width,scaleY=cv.height/rect.height;
  const cell=TPX*zoom;
  const col=Math.floor((e.clientX-rect.left)*scaleX/cell),r=Math.floor((e.clientY-rect.top)*scaleY/cell);
  return(col>=0&&col<G&&r>=0&&r<GR)?{r,c:col}:null;
}

function pushUndo(){undoStack.push(deepCopy(layout));if(undoStack.length>30)undoStack.shift();redoStack=[]}
function doUndo(){if(!undoStack.length)return;redoStack.push(deepCopy(layout));layout=undoStack.pop();drawCanvas();saveState();setStatus("Undo.")}
function doRedo(){if(!redoStack.length)return;undoStack.push(deepCopy(layout));layout=redoStack.pop();drawCanvas();saveState();setStatus("Redo.")}

function apply(r,c,start){
  // WalkEdit mode: toggle walk/wall, nothing else
  if(walkEditMode&&showWalk){
    const ti=layout[r][c];
    if(ti>=0&&ti<palette.length){
      if(start)pushUndo();
      const cur=getTileWalk(ti);
      palette[ti].walk=!cur;
      drawCombinedPalette();drawCanvas();saveState();updateTileProps();
      setStatus("Tile "+ti+": "+(palette[ti].walk?"WALKABLE":"WALL"));
    }
    return;
  }
  if(tool==="paint"){
    // Add pending tile to palette on first paint
    if(pendingSrc&&sel<0){
      if(palette.length>=128){setStatus("Palette full");return}
      palette.push({ts:pendingSrc.ts,idx:pendingSrc.idx});
      sel=palette.length-1;pendingSrc=null;
      drawSrcPalette();drawCombinedPalette();
    }
    if(sel<0){setStatus("Select a tile first!");return}
    if(layout[r][c]!==sel){if(start)pushUndo();layout[r][c]=sel;drawCanvas();saveState()}
  }else if(tool==="stamp"&&activeStamp>=0){
    const st=stamps[activeStamp];if(!st)return;
    if(c+st.w-1<G&&r+st.h-1<GR){
      if(start)pushUndo();
      for(let dr=0;dr<st.h;dr++)for(let dc=0;dc<st.w;dc++)
        layout[r+dr][c+dc]=st.tiles[dr*st.w+dc];
      drawCanvas();saveState();
    }
  }else if(tool==="erase"){
    if(layout[r][c]!==-1){if(start)pushUndo();layout[r][c]=-1;drawCanvas();saveState()}
  }else if(tool==="pick"){
    const ti=layout[r][c];
    if(ti>=0){sel=ti;setTool("paint");drawCombinedPalette();setStatus("Picked slot "+ti)}
  }else if(tool==="fill"){
    const target=layout[r][c];if(target===sel||sel<0)return;if(start)pushUndo();
    const stk=[[r,c]],vis=new Set();
    while(stk.length){
      const[cr,cc]=stk.pop(),k=cr+","+cc;
      if(vis.has(k)||cr<0||cr>=GR||cc<0||cc>=G||layout[cr][cc]!==target)continue;
      vis.add(k);layout[cr][cc]=sel;stk.push([cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]);
    }
    drawCanvas();saveState();
  }
}

function setTool(t){
  tool=t;if(t!=="stamp")activeStamp=-1;
  ["paint","stamp","erase","pick","fill"].forEach(n=>{
    const el=document.getElementById("bt_"+n);if(el)el.classList.toggle("active",n===t)});
  document.getElementById("mainCanvas").style.cursor=
    t==="pick"?"crosshair":t==="fill"?"cell":t==="stamp"?"copy":"pointer";
  if(t==="stamp")renderStamps();
}
function toggleGrid(){showGrid=!showGrid;document.getElementById("gridBtn").textContent=showGrid?"Grid ✓":"Grid ✗";drawCanvas()}
function toggleMarkers(){showMark=!showMark;document.getElementById("markBtn").textContent=showMark?"Markers ✓":"Markers ✗";drawCanvas()}
function resetAll(){
  if(!confirm("Reset ALL editor state?\n\nThis clears:\n• Current palette & layout\n• All stamps & markers\n• LocalStorage cache\n\nCannot be undone!")) return;
  try{localStorage.clear()}catch(e){}
  palette=[];layout=Array.from({length:16},()=>Array(20).fill(-1));pendingSrc=null;srcSel=-1;
  stamps=[];markers=[
    {label:"Spawn",x:7,y:6,color:"#4ade80",glyph:"S",w:2,h:2},
    {label:"Exit→Castle",x:6,y:3,color:"#f87171",glyph:"E",w:2,h:2},
    {label:"StopTele",x:6,y:14,color:"#facc15",glyph:"T",w:2,h:2},
    {label:"Exit→Well",x:6,y:14,color:"#60a5fa",glyph:"\u2193",w:2,h:2},
  ];sel=-1;undoStack=[];redoStack=[];
  drawCanvas();drawCombinedPalette();drawSrcPalette();renderStamps();renderMarkers();
  setStatus("All state reset. Fresh start!");
}
function toggleWalkEdit(){
  walkEditMode=!walkEditMode;
  document.getElementById("walkEditBtn").textContent=walkEditMode?"WalkEdit ✓ (click tiles)":"WalkEdit ✗";
  if(walkEditMode&&!showWalk){toggleWalk()}// auto-enable walk overlay
}
function toggleWalk(){showWalk=!showWalk;document.getElementById("walkBtn").textContent=showWalk?"Walk ✓ (🔵W=walk 🟠X=wall)":"Walk ✗";drawCanvas();drawCombinedPalette();drawSrcPalette()}
function adjZoom(d){zoom=Math.max(2,Math.min(5,zoom+d));document.getElementById("zoomLbl").textContent=zoom+"×";drawCanvas()}
function clearAll(){pushUndo();layout=Array.from({length:GR},()=>Array(G).fill(-1));drawCanvas();saveState();setStatus("Cleared.")}

const mainCanvas=document.getElementById("mainCanvas");
mainCanvas.addEventListener("mousedown",e=>{e.preventDefault();painting=true;const p=getCell(e);if(p)apply(p.r,p.c,true)});
mainCanvas.addEventListener("mousemove",e=>{
  const p=getCell(e);hover=p;
  if(p){
    const ti=layout[p.r][p.c];
    let info=`(${p.c},${p.r})`;
    if(ti>=0&&ti<palette.length){
      const pp=palette[ti];
      info+=` slot ${ti} [${pp.ts} ${hex(pp.idx)} ${getTileWalk(ti)?"✓walk":"✗wall"}]`;
    } else info+=" empty";
    document.getElementById("hoverLbl").textContent=info;
  } else document.getElementById("hoverLbl").textContent="";
  if(painting&&p&&(tool==="paint"||tool==="erase"))apply(p.r,p.c,false);
  else drawCanvas();
});
mainCanvas.addEventListener("mouseup",()=>{painting=false});
mainCanvas.addEventListener("mouseleave",()=>{painting=false;hover=null;drawCanvas()});

// ===== Stamps with variable sizes =====
function newStamp(){
  if(!palette.length){setStatus("Add tiles first!");return}
  const sizeStr=prompt("Stamp size (WxH):\n1x2, 2x1, or 2x2","2x2");
  if(!sizeStr)return;
  const m=sizeStr.match(/(\d+)\s*[x×]\s*(\d+)/i);
  if(!m){setStatus("Format: WxH (e.g. 2x2)");return}
  const w=parseInt(m[1]),h=parseInt(m[2]);
  if(w<1||w>4||h<1||h>4){setStatus("Size 1-4 each");return}
  const name=prompt("Stamp name:","Stamp "+(stamps.length+1));
  if(!name)return;
  stampBuilder={name,w,h,tiles:[],needed:w*h};
  const labels=w===2&&h===2?["top-left","top-right","bottom-left","bottom-right"]:
    w===1&&h===2?["top","bottom"]:w===2&&h===1?["left","right"]:
    Array.from({length:w*h},(_,i)=>`tile ${i+1}`);
  setStatus(`Stamp '${name}' (${w}×${h}): click ${labels[0]} tile (1/${w*h})`);
}
function finishStampStep(){
  if(!stampBuilder)return;
  const {name,w,h,tiles,needed}=stampBuilder;
  if(tiles.length>=needed){
    stamps.push({name,w,h,tiles:[...tiles]});
    stampBuilder=null;renderStamps();saveState();
    setStatus("Stamp '"+name+"' created! Select → Stamp tool → click canvas.");
  } else {
    const labels=w===2&&h===2?["top-left","top-right","bottom-left","bottom-right"]:
      w===1&&h===2?["top","bottom"]:w===2&&h===1?["left","right"]:
      Array.from({length:needed},(_,i)=>`tile ${i+1}`);
    setStatus(`Stamp '${name}': click ${labels[tiles.length]} (${tiles.length+1}/${needed})`);
  }
}
function renderStamps(){
  const grid=document.getElementById("stampGrid");grid.innerHTML="";
  if(!stamps.length){grid.innerHTML='<div class="panel-sub">Click + New → pick size → click tiles in order.</div>';return}
  stamps.forEach((st,si)=>{
    const div=document.createElement("div");
    div.className="stamp-item"+(si===activeStamp?" active":"");
    div.title=st.name+` (${st.w}×${st.h})\nClick → Stamp tool → paint`;
    const scale=2,cw=st.w*8*scale,ch=st.h*8*scale;
    const cv=document.createElement("canvas");cv.width=cw;cv.height=ch;
    cv.style.cssText=`width:${cw}px;height:${ch}px;image-rendering:pixelated`;
    const c=cv.getContext("2d");c.imageSmoothingEnabled=false;
    for(let dr=0;dr<st.h;dr++)for(let dc=0;dc<st.w;dc++){
      const ti=st.tiles[dr*st.w+dc];
      if(ti>=0&&ti<palette.length){
        const p=palette[ti],img=tsImages[p.ts];
        if(img)c.drawImage(img,(p.idx%16)*8,Math.floor(p.idx/16)*8,8,8,dc*8*scale,dr*8*scale,8*scale,8*scale);
      }
    }
    div.appendChild(cv);
    const lbl=document.createElement("div");
    lbl.style.cssText="font-size:9px;color:#888;text-align:center;overflow:hidden";
    lbl.textContent=st.name;div.appendChild(lbl);
    div.addEventListener("click",()=>{activeStamp=si;setTool("stamp");renderStamps();setStatus("Stamp '"+st.name+"' ("+st.w+"×"+st.h+") — click canvas")});
    const del=document.createElement("button");del.className="stamp-del";del.textContent="×";
    del.addEventListener("click",e=>{e.stopPropagation();stamps.splice(si,1);if(activeStamp>=stamps.length)activeStamp=-1;renderStamps();saveState()});
    div.appendChild(del);grid.appendChild(div);
  });
}

// ===== Load room =====
function loadRoom(val){
  if(!val||!ROOMS[val])return;
  const room=ROOMS[val];pushUndo();
  palette=[];
  const tsKey=room.ts,tileMap={};
  room.layout.forEach(row=>row.forEach(t=>{
    const k=tsKey+":"+t;
    if(!(k in tileMap)){tileMap[k]=palette.length;palette.push({ts:tsKey,idx:t})}
  }));
  layout=room.layout.map(row=>row.map(t=>tileMap[tsKey+":"+t]));
  sel=0;
  getTSImage(tsKey,()=>{drawSrcPalette();drawCombinedPalette();drawCanvas()});
  loadSrcTileset(tsKey);document.getElementById("srcTS").value=tsKey;
  setStatus("Loaded "+room.name+" — "+palette.length+" tiles. Threshold: "+(TILE_THRESH[tsKey]||"?"));
  saveState();
}

// ===== Export/Import =====
function showExport(){
  const palExport=palette.map((p,i)=>{
    const pm=TILE_PAL[p.ts];const pal=pm?parseInt(pm[String(p.idx)]||"0"):0;
    return {slot:i,ts:p.ts,idx:p.idx,pal,walkable:getTileWalk(i)};
  });
  const data={_generator:"DWM1_Multi_Tileset_Editor_v3",palette:palExport,layout,
    stamps:stamps.map(s=>({name:s.name,w:s.w,h:s.h,tiles:[...s.tiles]})),markers};
  const area=document.getElementById("exportArea");
  area.value=JSON.stringify(data,null,2);
  document.getElementById("exportBox").style.display="block";area.focus();area.select();
  setStatus("Exported: "+palette.length+" tiles, threshold="+(TILE_THRESH[palette[0]?.ts]||"?"));
}
function copyExport(){navigator.clipboard?navigator.clipboard.writeText(document.getElementById("exportArea").value).then(()=>setStatus("Copied!")):setStatus("Use Cmd+C")}
function showImportBox(){document.getElementById("importBox").style.display="block"}
function doImport(){
  try{
    const p=JSON.parse(document.getElementById("importArea").value);pushUndo();
    if(p.palette)palette=p.palette.map(e=>{const o={ts:e.ts,idx:e.idx};if(e.walkable!==undefined&&e.walkable!==isWalkable(e.ts,e.idx))o.walk=e.walkable;return o});
    if(p.layout)layout=p.layout;
    if(p.stamps)stamps=p.stamps.map(s=>({name:s.name,w:s.w||2,h:s.h||2,tiles:s.tiles}));
    if(p.markers)markers=p.markers;
    sel=0;
    const tsKeys=new Set(palette.map(p=>p.ts));
    let rem=tsKeys.size;
    if(!rem){drawCanvas();drawCombinedPalette();renderStamps();renderMarkers();saveState();return}
    tsKeys.forEach(k=>getTSImage(k,()=>{rem--;if(!rem){drawCanvas();drawCombinedPalette();drawSrcPalette();renderStamps();renderMarkers();saveState()}}));
    document.getElementById("importBox").style.display="none";
    setStatus("Imported! "+palette.length+" tiles");
  }catch(e){setStatus("Error: "+e.message)}
}

// ===== Markers =====
function renderMarkers(){
  const list=document.getElementById("markerList");list.innerHTML="";
  markers.forEach((m,i)=>{
    const row=document.createElement("div");row.className="mrow";
    row.innerHTML=`<span class="mdot" style="background:${m.color}"></span>
      <span style="min-width:60px">${m.label}</span>
      <span class="mkey">x</span><input class="minp" type="number" min="0" max="19" value="${m.x}" data-i="${i}" data-f="x">
      <span class="mkey">y</span><input class="minp" type="number" min="0" max="15" value="${m.y}" data-i="${i}" data-f="y">
      <button class="sbtn" style="font-size:9px;padding:1px 4px;color:#f66" onclick="removeMarker(${i})">×</button>`;
    list.appendChild(row);
  });
  list.querySelectorAll("input").forEach(inp=>inp.addEventListener("change",e=>{
    markers[parseInt(e.target.dataset.i)][e.target.dataset.f]=parseInt(e.target.value)||0;
    drawCanvas();saveState();
  }));
}
function addMarker(){
  const label=prompt("Marker label:","Marker");if(!label)return;
  const glyph=prompt("Glyph (1 char):","M");if(!glyph)return;
  const colors=["#4ade80","#f87171","#60a5fa","#facc15","#c084fc","#fb923c"];
  markers.push({label,x:10,y:8,color:colors[markers.length%colors.length],glyph:glyph[0],w:2,h:2});
  renderMarkers();drawCanvas();saveState();
}
function removeMarker(i){markers.splice(i,1);renderMarkers();drawCanvas();saveState()}

// ===== Persistence =====
function saveState(){try{localStorage.setItem("dwm-mteditor-v3",JSON.stringify({palette,layout,stamps,markers,sel,curSrcTS}))}catch(e){}}
function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem("dwm-mteditor-v3"));
    if(s){
      if(s.palette)palette=s.palette;if(s.layout)layout=s.layout;
      if(s.stamps)stamps=(s.stamps||[]).map(st=>({name:st.name,w:st.w||2,h:st.h||2,tiles:st.tiles}));
      if(s.markers)markers=s.markers;if(s.sel!==undefined)sel=s.sel;
      if(s.curSrcTS){curSrcTS=s.curSrcTS;document.getElementById("srcTS").value=curSrcTS}
      const tsKeys=new Set(palette.map(p=>p.ts));
      if(curSrcTS)tsKeys.add(curSrcTS);
      let rem=tsKeys.size;if(!rem)return;
      tsKeys.forEach(k=>getTSImage(k,()=>{rem--;if(!rem){
        srcImg=tsImages[curSrcTS]||null;
        drawSrcPalette();drawCombinedPalette();drawCanvas();renderStamps();
      }}));
      setStatus("Restored — "+palette.length+" tiles");
    }
  }catch(e){}
}

// ===== Init =====
Object.keys(ROOMS).sort((a,b)=>{const[am,as]=a.split("_").map(Number),[bm,bs]=b.split("_").map(Number);return am-bm||as-bs}).forEach(k=>{
  const r=ROOMS[k],o=document.createElement("option");o.value=k;
  o.textContent=`$${r.mapid.toString(16).toUpperCase().padStart(2,"0")}.${r.scr} ${r.name}`;
  document.getElementById("roomSelect").appendChild(o);
});
Object.keys(TS).sort().forEach(k=>{const o=document.createElement("option");o.value=k;o.textContent=k+" "+(TS_NAMES[k]||"");document.getElementById("srcTS").appendChild(o)});
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
  if(e.key==="z"&&(e.metaKey||e.ctrlKey)){e.preventDefault();e.shiftKey?doRedo():doUndo()}
  if(e.key==="p")setTool("paint");if(e.key==="e")setTool("erase");
  if(e.key==="i")setTool("pick");if(e.key==="f")setTool("fill");
  if(e.key==="s")setTool("stamp");if(e.key==="g")toggleGrid();if(e.key==="w")toggleWalk();
});
loadState();renderMarkers();renderStamps();
if(!palette.length){loadSrcTileset(Object.keys(TS).sort()[0]);drawCanvas()}

</script></body></html>
